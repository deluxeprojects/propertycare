<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Audit R2 — Screenshot Gallery — ProKeep</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#f1f5f9;padding:2rem}
h1{text-align:center;margin-bottom:.5rem;font-size:2rem}
.sub{text-align:center;color:#94a3b8;margin-bottom:2rem}
.group{margin-bottom:3rem}
.group h2{font-size:1.3rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #334155;color:#4ECDC4}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.card{background:#1e293b;border-radius:8px;overflow:hidden}
.card img{width:100%;height:auto;display:block;cursor:pointer;transition:transform .2s}
.card img:hover{transform:scale(1.02)}
.cap{padding:.5rem .75rem;font-size:.8rem;color:#94a3b8;display:flex;justify-content:space-between}
.cap .bp{color:#4ECDC4;font-weight:600}
.bar{display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.bar button{padding:.4rem 1rem;border:1px solid #334155;border-radius:6px;background:0 0;color:#94a3b8;cursor:pointer;font-size:.85rem}
.bar button.on,.bar button:hover{background:#4ECDC4;color:#0f172a;border-color:#4ECDC4}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;justify-content:center;align-items:center}
.modal.open{display:flex}
.modal img{max-width:95vw;max-height:95vh;object-fit:contain}
.modal .x{position:absolute;top:1rem;right:1rem;color:#fff;font-size:2rem;cursor:pointer;background:0 0;border:0}
.section-title{text-align:center;font-size:1.6rem;margin:3rem 0 1rem;color:#fff}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>QA Audit R2 — Screenshot Gallery</h1>
<p class="sub">ProKeep | 2026-04-04 | 105 total screenshots (42 localhost + 48 production + 15 staging)</p>
<div class="bar">
<button class="on" onclick="filter('all')">All</button>
<button onclick="filter('375')">Mobile</button>
<button onclick="filter('768')">Tablet</button>
<button onclick="filter('1440')">Desktop</button>
</div>
<div id="g"></div>
<div class="modal" id="m" onclick="closeModal()">
<button class="x">&times;</button>
<img id="mi" src="" alt="">
</div>
<script>
const L=['home','home-services','home-services-guardian','areas','care-plans','blog','book','about','contact','login','privacy','terms','staff-login','admin-login'];
const P=['prod-home','prod-home-services','prod-home-services-guardian','prod-home-services-cleaning','prod-home-services-cleaning-deep-cleaning','prod-home-services-ac-services','prod-areas','prod-areas-dubai-marina','prod-areas-palm-jumeirah','prod-care-plans','prod-blog','prod-about','prod-contact','prod-login','prod-privacy','prod-terms'];
const S=['staging-home','staging-home-services','staging-home-services-cleaning','staging-home-services-guardian','staging-areas','staging-areas-dubai-marina','staging-care-plans','staging-blog','staging-about','staging-contact','staging-login','staging-privacy','staging-terms','staging-staff-login','staging-admin-login'];
function fmt(s){return s.replace(/^(prod-|staging-)/,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
function grp(slug,bps){let h='<div class="group"><h2>'+fmt(slug)+'</h2><div class="grid">';bps.forEach(b=>{h+='<div class="card" data-bp="'+b+'"><img src="'+slug+'-'+b+'.png" alt="'+fmt(slug)+' '+b+'px" loading="lazy" onclick="openModal(this)"><div class="cap"><span>'+slug+'-'+b+'.png</span><span class="bp">'+b+'px</span></div></div>'});return h+'</div></div>'}
let html='<p class="section-title">Localhost (dev server)</p>';
L.forEach(r=>{html+=grp(r,[375,768,1440])});
html+='<p class="section-title">Production (www.prokeep.ae)</p>';
P.forEach(r=>{html+=grp(r,[375,768,1440])});
html+='<p class="section-title">Staging (Vercel preview)</p>';
S.forEach(r=>{html+=grp(r,[1440])});
document.getElementById('g').innerHTML=html;
function filter(bp){document.querySelectorAll('.bar button').forEach(b=>b.classList.remove('on'));event.target.classList.add('on');document.querySelectorAll('.card').forEach(s=>{s.style.display=(bp==='all'||s.dataset.bp===bp)?'':'none'})}
function openModal(img){document.getElementById('mi').src=img.src;document.getElementById('m').classList.add('open')}
function closeModal(){document.getElementById('m').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
